preset:
  name: elysium-mons
  description: "Elysium Mons — eastern volcanic province (25.02°N, 147.21°E, +1500 m)"

planet:
  latitude: 25.02             # °N — Elysium volcanic province
  longitude: 147.21           # °E
  elevation_m: 1500.0         # m — lower flanks of Elysium shield

  surface_temperature: 213.0  # K — slightly warmer than Olympus; lower altitude
  surface_pressure: 610.0     # Pa — global datum; Mars model corrects to ≈533 Pa at +1500 m
  albedo: 0.24                # mixed basalt and aeolian dust
  greenhouse_factor: 1.02
  ice_mass: 5.0e15            # kg
  initial_ls_deg: 251.0       # °

engine:
  dt: 3600.0
  accuracy: fast

experiment:
  type: sol
  sols: 1.0

output:
  save_csv: true
  save_plot: true
  out_dir: null
