preset:
  name: gale-crater
  description: "Gale Crater — Curiosity MSL landing site (4.6°S, 137.4°E, -4500 m)"

planet:
  surface_temperature: 220.0   # K — REMS annual mean at Gale (~215–220 K; MCD extvar[14] at -4500 m)
  surface_pressure: 730.0      # Pa — MCD/REMS annual mean at -4500 m elevation (range 690–930 Pa)
  albedo: 0.25
  greenhouse_factor: 1.02
  ice_mass: 5.0e15             # kg
  latitude: -4.589             # degrees N (south = negative)
  longitude: 137.441           # degrees E
  elevation_m: -4500.0         # m — 4.5 km below Mars datum
  initial_ls_deg: 287.0        # REMS Sol 224 solar longitude

engine:
  dt: 300.0                    # seconds — fine timestep for accurate diurnal cycle
  accuracy: accurate

experiment:
  type: sol
  sols: 1.0

output:
  save_csv: true
  save_plot: true
  ground_truth: true           # overlay REMS Curiosity Sol 224 data by default
  out_dir: null
