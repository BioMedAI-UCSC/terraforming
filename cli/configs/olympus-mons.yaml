preset:
  name: olympus-mons
  description: "Olympus Mons flank — largest volcano in the solar system (18.65°N, 226.2°E, +2000 m)"

planet:
  latitude: 18.65             # °N — Tharsis volcanic province
  longitude: 226.2            # °E  (= 133.8°W)
  elevation_m: 2000.0         # m — lower flank; summit is +21 229 m

  surface_temperature: 210.0  # K — high-altitude equatorial plateau; MCD annual mean
  surface_pressure: 610.0     # Pa — global datum; Mars model corrects to ≈508 Pa at +2000 m
  albedo: 0.22                # dark basaltic lava flows, low airfall dust
  greenhouse_factor: 1.02
  ice_mass: 5.0e15            # kg — negligible surface ice at equatorial volcano
  initial_ls_deg: 251.0       # ° — perihelion season (default)

engine:
  dt: 3600.0
  accuracy: fast

experiment:
  type: sol
  sols: 1.0

output:
  save_csv: true
  save_plot: true
  out_dir: null
