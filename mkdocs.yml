site_name: Terraforming
site_description: Mars terraforming physics framework — planets, atmospheres, orbital mechanics
repo_url: https://github.com/BioMedAI-UCSC/terraforming
repo_name: BioMedAI-UCSC/terraforming
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.integrate
    - content.action.edit

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [package]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            members_order: source

extra_javascript:
  - javascripts/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js

extra_css:
  - https://unpkg.com/katex@0/dist/katex.min.css
  - stylesheets/mars.css

nav:
  - Home: index.md
  - Getting Started:
      - What is tform?: getting-started/what-is-tform.md
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - CLI Reference:
      - Commands: cli/commands.md
      - Presets: cli/presets.md
  - Wiki:
      - Orbital Mechanics: wiki/orbital-mechanics.md
      - Solar Radiation: wiki/solar-radiation.md
      - Greenhouse Effect: wiki/greenhouse-effect.md
      - Mars:
          - Overview: wiki/mars/index.md
          - Solar Flux Model: wiki/mars/solar-flux.md
          - Climate Model: wiki/mars/climate-model.md
          - GHG Interventions: wiki/mars/interventions.md
  - Architecture:
      - Planet Framework: architecture/planet.md
      - Mars Model: architecture/mars.md
      - Interventions: architecture/interventions.md
  - API Reference:
      - Framework: api/framework.md
      - Mars: api/celestials.md
      - Engine: api/engine.md
      - Interventions: api/interventions.md
