name: Deploy Docs

on:
  push:
    branches: [main, mkdocs]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3

      - name: Build docs
        run: uv run mkdocs build

      - name: Deploy to public docs repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          external_repository: BioMedAI-UCSC/terraforming-docs
          publish_branch: gh-pages
          publish_dir: ./site
          commit_message: "docs: ${{ github.event.head_commit.message }}"
