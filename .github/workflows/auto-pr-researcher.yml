name: Auto PR — Researcher Idea

on:
  push:
    branches:
      - "researcher-idea/**"

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive metadata from branch name
        id: meta
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          SLUG="${BRANCH#researcher-idea/}"
          TITLE=$(echo "$SLUG" | sed 's/-/ /g' | awk '{for(i=1;i<=NF;i++) $i=toupper(substr($i,1,1)) tolower(substr($i,2)); print}')
          echo "slug=$SLUG"     >> "$GITHUB_OUTPUT"
          echo "title=$TITLE"   >> "$GITHUB_OUTPUT"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Check for existing PR
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list \
            --head "${{ steps.meta.outputs.branch }}" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          echo "existing=$EXISTING" >> "$GITHUB_OUTPUT"

      - name: Write PR body
        if: steps.check.outputs.existing == ''
        run: |
          cat > /tmp/pr-body.md << 'BODY'
          ## Research Direction: ${{ steps.meta.outputs.title }}

          This PR was auto-created from a **mars-researcher agent** session.

          ### What's inside
          - Research direction document at `docs/ideas/${{ steps.meta.outputs.slug }}.md`
          - Includes background, central hypothesis, supporting evidence, proposed experiments, and research tasks

          ### Review checklist
          - [ ] Citations are valid and accessible
          - [ ] Central hypothesis is falsifiable
          - [ ] Proposed experiments are implementable in `package/src/framework/`
          - [ ] Cross-references to related `docs/ideas/` files are accurate

          > Auto-generated by the `mars-researcher` Claude Code agent.
          BODY

      - name: Create PR
        if: steps.check.outputs.existing == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "Research: ${{ steps.meta.outputs.title }}" \
            --body-file /tmp/pr-body.md \
            --base main \
            --head "${{ steps.meta.outputs.branch }}"
