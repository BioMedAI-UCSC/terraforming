name: Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Package tests (framework, engine, celestials, interventions)
        working-directory: package
        run: uv run python -m pytest tests/ -v -m "not slow"

      - name: CLI tests
        working-directory: cli
        run: uv run python -m pytest tests/ -v
